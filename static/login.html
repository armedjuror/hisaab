<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hisaab — Sign in</title>
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d0f14;
    --surface:  #161920;
    --surface2: #1e2230;
    --border:   #2a2f40;
    --text:     #e8eaf0;
    --muted:    #6b7280;
    --accent:   rgba(152,117,63,1);
    --accent2:  rgba(216,168,90,1);
    --green:    #22c55e;
    --red:      #ef4444;
    --radius:   14px;
    --font-head: 'Merriweather', serif;
    --font-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* Background glow */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse at center top,
      rgba(152,117,63,.1) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo {
    display: flex;
    align-items: center;
    text-decoration: none;
    margin-bottom: 40px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    width: 100%;
    max-width: 400px;
  }

  .card-title {
    font-family: var(--font-head);
    font-size: 22px; font-weight: 800;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }
  .card-sub {
    font-size: 14px; color: var(--muted);
    margin-bottom: 28px; line-height: 1.5;
  }

  /* Steps */
  .step { display: none; }
  .step.active { display: block; }

  label {
    display: block;
    font-size: 13px; color: var(--muted);
    margin-bottom: 7px;
  }
  input[type="email"],
  input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    outline: none;
    transition: border-color .18s;
    margin-bottom: 18px;
  }
  input:focus { border-color: var(--accent); }

  .btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: var(--font-body);
    font-size: 15px; font-weight: 600;
    cursor: pointer;
    transition: opacity .18s, transform .12s;
  }
  .btn:hover { opacity: .9; }
  .btn:active { transform: scale(.98); }
  .btn:disabled { opacity: .45; pointer-events: none; }

  .error-msg {
    background: rgba(239,68,68,.12);
    border: 1px solid rgba(239,68,68,.3);
    color: var(--red);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .error-msg.show { display: block; }

  .info-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-size: 13px; color: var(--muted);
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .info-box strong { color: var(--text); }

  .otp-hint {
    font-size: 12px; color: var(--muted);
    text-align: center;
  }
  .otp-hint a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .otp-hint a:hover { text-decoration: underline; }

  .channel-btn {
    padding: 7px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .channel-btn:hover { border-color: var(--accent); background: rgba(152,117,63,.1); }
  .channel-btn.active { border-color: var(--accent); background: rgba(152,117,63,.15); }

  footer-link {
    display: block;
    text-align: center;
    margin-top: 24px;
    font-size: 13px; color: var(--muted);
  }
  footer-link a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<a class="logo" href="/"><img src="/static/logo.svg" alt="Hisaab" height="28"></a>

<div class="card">

  <!-- Step 1: Email -->
  <div class="step active" id="step-email">
    <div class="card-title">Sign in</div>
    <p class="card-sub">We'll send a one-time code to your Telegram bot.</p>

    <div class="error-msg" id="email-error"></div>

    <label for="email-input">Email address</label>
    <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email">

    <button class="btn" id="email-btn" onclick="requestOTP()">Send code</button>
  </div>

  <!-- Step 2: OTP -->
  <div class="step" id="step-otp">
    <div class="card-title">Enter your code</div>
    <p class="card-sub">Check your bot for the 6-digit login code.</p>

    <div class="error-msg" id="otp-error"></div>

    <div class="info-box">
      Sent a code to your <strong id="otp-platform">bot</strong>.
      Open the chat and paste the code below.
    </div>

    <label for="otp-input">6-digit code</label>
    <input type="text" id="otp-input" placeholder="123456" maxlength="6"
           inputmode="numeric" autocomplete="one-time-code">

    <button class="btn" id="otp-btn" onclick="verifyOTP()">Verify & sign in</button>

    <!-- Channel picker -->
    <div id="channel-picker" style="display:none;margin-top:18px">
      <p style="font-size:13px;color:var(--muted);margin-bottom:10px">Send code to a different channel:</p>
      <div id="channel-btns" style="display:flex;gap:8px;flex-wrap:wrap"></div>
    </div>

    <p class="otp-hint" style="margin-top:14px">
      Didn't get it?
      <a onclick="resendOTP()">Resend</a>
      &nbsp;·&nbsp;
      <a onclick="resetToEmail()">Different email</a>
    </p>
  </div>

</div>

<footer-link>
  <a href="/">← Back to home</a>
</footer-link>

<script>
  let currentEmail = '';
  let currentPlatform = null;

  const $ = id => document.getElementById(id);

  function showError(elId, msg) {
    const el = $(elId);
    el.textContent = msg;
    el.classList.add('show');
  }
  function clearError(elId) { $(elId).classList.remove('show'); }

  function setStep(name) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    $('step-' + name).classList.add('active');
  }

  function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

  async function loadChannels(email) {
    try {
      const res  = await fetch(`/api/auth/web/channels?email=${encodeURIComponent(email)}`);
      const data = await res.json();
      const platforms = data.platforms || [];
      const picker = $('channel-picker');
      const btns   = $('channel-btns');
      if (platforms.length <= 1) { picker.style.display = 'none'; return; }
      btns.innerHTML = platforms.map(p =>
        `<button class="channel-btn${p === currentPlatform ? ' active' : ''}"
           onclick="sendToChannel('${p}')">${cap(p)}</button>`
      ).join('');
      picker.style.display = 'block';
    } catch (_) {}
  }

  async function sendToChannel(platform) {
    currentPlatform = platform;
    $('otp-platform').textContent = cap(platform);
    // Update active button
    document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    await sendOTP(platform);
  }

  async function sendOTP(platform = null) {
    const body = { email: currentEmail };
    if (platform) body.platform = platform;
    const res  = await fetch('/api/auth/web/request-otp', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (data.sent_to) {
      currentPlatform = data.sent_to;
      $('otp-platform').textContent = cap(data.sent_to);
    }
    return data;
  }

  async function requestOTP() {
    clearError('email-error');
    const email = $('email-input').value.trim();
    if (!email || !email.includes('@')) {
      showError('email-error', 'Please enter a valid email address.');
      return;
    }
    const btn = $('email-btn');
    btn.disabled = true; btn.textContent = 'Sending…';
    try {
      currentEmail = email;
      const data = await sendOTP();
      currentPlatform = data.sent_to;
      $('otp-platform').textContent = data.sent_to ? cap(data.sent_to) : 'bot';
      await loadChannels(email);
      setStep('otp');
      setTimeout(() => $('otp-input').focus(), 100);
    } catch (e) {
      showError('email-error', 'Something went wrong. Please try again.');
    } finally {
      btn.disabled = false; btn.textContent = 'Send code';
    }
  }

  async function verifyOTP() {
    clearError('otp-error');
    const otp = $('otp-input').value.trim();
    if (otp.length !== 6 || !/^\d+$/.test(otp)) {
      showError('otp-error', 'Please enter the 6-digit code from your bot.');
      return;
    }
    const btn = $('otp-btn');
    btn.disabled = true; btn.textContent = 'Verifying…';
    try {
      const res  = await fetch('/api/auth/web/verify-otp', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: currentEmail, otp }),
      });
      const data = await res.json();
      if (!res.ok) { showError('otp-error', data.detail || 'Invalid or expired code. Try again.'); return; }
      window.location.href = '/app';
    } catch (e) {
      showError('otp-error', 'Something went wrong. Please try again.');
    } finally {
      btn.disabled = false; btn.textContent = 'Verify & sign in';
    }
  }

  async function resendOTP() {
    $('otp-input').value = '';
    clearError('otp-error');
    await sendOTP(currentPlatform);
  }

  function resetToEmail() {
    $('otp-input').value = '';
    clearError('otp-error');
    $('channel-picker').style.display = 'none';
    setStep('email');
    setTimeout(() => $('email-input').focus(), 100);
  }

  $('email-input').addEventListener('keydown', e => { if (e.key === 'Enter') requestOTP(); });
  $('otp-input').addEventListener('keydown',   e => { if (e.key === 'Enter') verifyOTP(); });
  $('otp-input').addEventListener('input', () => {
    if ($('otp-input').value.replace(/\D/g, '').length === 6) verifyOTP();
  });
</script>
</body>
</html>
